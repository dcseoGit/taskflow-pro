<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>TaskFlow Pro</title>

  <!-- FOUC 방지: Tailwind CDN 로드 전에 테마 클래스 즉시 적용 -->
  <script>
    (function () {
      const stored = localStorage.getItem('theme');
      const prefersDark = matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>

<body class="font-sans bg-gray-100 dark:bg-gray-950 min-h-screen transition-colors duration-200">

  <!-- ── 헤더 ───────────────────────────────────────────────── -->
  <header class="sticky top-0 z-10 backdrop-blur-md bg-white/70 dark:bg-gray-900/70 border-b border-gray-200/50 dark:border-gray-700/50 shadow-sm">
    <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
      <h1 class="text-base font-semibold text-gray-900 dark:text-white tracking-tight">
        TaskFlow Pro
      </h1>
      <button id="theme-toggle"
        class="min-h-[44px] min-w-[44px] flex items-center justify-center rounded-xl
               text-gray-500 dark:text-gray-400
               hover:bg-gray-100 dark:hover:bg-gray-800
               transition-all duration-200"
        aria-label="테마 전환">
        <span id="theme-icon"></span>
      </button>
    </div>
  </header>

  <!-- ── 본문 ───────────────────────────────────────────────── -->
  <main class="max-w-2xl mx-auto px-4 py-6 space-y-5">

    <!-- 추가 폼 -->
    <section class="rounded-xl shadow-lg bg-white/80 dark:bg-gray-900/80 backdrop-blur-md
                    border border-gray-200/50 dark:border-gray-700/50 p-5">
      <p class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-3">
        새 태스크
      </p>
      <form id="add-form" class="space-y-3" novalidate>
        <div>
          <input id="f-title" type="text" placeholder="제목 (필수)"
            class="w-full rounded-xl px-4 py-2.5 text-sm
                   bg-gray-50 dark:bg-gray-800
                   border border-gray-200 dark:border-gray-700
                   text-gray-900 dark:text-white placeholder-gray-400
                   focus:outline-none focus:ring-2 focus:ring-blue-500
                   transition-all duration-200" />
          <p id="title-error" class="hidden mt-1 pl-1 text-xs text-red-500">
            제목을 입력해주세요.
          </p>
        </div>
        <div class="flex gap-2">
          <input id="f-due" type="datetime-local"
            class="flex-1 min-w-0 rounded-xl px-4 py-2.5 text-sm
                   bg-gray-50 dark:bg-gray-800
                   border border-gray-200 dark:border-gray-700
                   text-gray-900 dark:text-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500
                   transition-all duration-200" />
          <select id="f-status"
            class="rounded-xl px-3 py-2.5 text-sm
                   bg-gray-50 dark:bg-gray-800
                   border border-gray-200 dark:border-gray-700
                   text-gray-900 dark:text-white
                   focus:outline-none focus:ring-2 focus:ring-blue-500
                   transition-all duration-200">
            <option value="todo">할 일</option>
            <option value="in_progress">진행 중</option>
            <option value="done">완료</option>
          </select>
        </div>
        <button type="submit"
          class="w-full min-h-[44px] rounded-xl
                 bg-blue-500 hover:bg-blue-600 active:bg-blue-700
                 text-white text-sm font-medium
                 shadow-md transition-all duration-200">
          추가
        </button>
      </form>
    </section>

    <!-- 태스크 목록 -->
    <section>
      <div id="task-list" class="space-y-3"></div>
      <p id="empty-msg" class="hidden text-center text-sm text-gray-400 dark:text-gray-500 py-16">
        태스크 없음
      </p>
    </section>

  </main>

  <!-- ── 수정 모달 ──────────────────────────────────────────── -->
  <div id="modal-overlay"
    class="hidden fixed inset-0 z-20 bg-black/40 backdrop-blur-sm
           flex items-center justify-center p-4">
    <div id="modal"
      class="w-full max-w-md rounded-xl shadow-lg
             bg-white dark:bg-gray-900
             border border-gray-200/50 dark:border-gray-700/50
             p-6 space-y-3">
      <div class="flex items-center justify-between mb-1">
        <p class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider">
          태스크 수정
        </p>
        <button id="modal-close"
          class="min-h-[44px] min-w-[44px] flex items-center justify-center rounded-xl
                 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200
                 hover:bg-gray-100 dark:hover:bg-gray-800
                 transition-all duration-200">
          ✕
        </button>
      </div>
      <input id="m-title" type="text" placeholder="제목"
        class="w-full rounded-xl px-4 py-2.5 text-sm
               bg-gray-50 dark:bg-gray-800
               border border-gray-200 dark:border-gray-700
               text-gray-900 dark:text-white placeholder-gray-400
               focus:outline-none focus:ring-2 focus:ring-blue-500
               transition-all duration-200" />
      <textarea id="m-desc" rows="3" placeholder="설명"
        class="w-full rounded-xl px-4 py-2.5 text-sm
               bg-gray-50 dark:bg-gray-800
               border border-gray-200 dark:border-gray-700
               text-gray-900 dark:text-white placeholder-gray-400
               focus:outline-none focus:ring-2 focus:ring-blue-500
               transition-all duration-200 resize-none"></textarea>
      <div class="flex gap-2">
        <input id="m-due" type="datetime-local"
          class="flex-1 min-w-0 rounded-xl px-4 py-2.5 text-sm
                 bg-gray-50 dark:bg-gray-800
                 border border-gray-200 dark:border-gray-700
                 text-gray-900 dark:text-white
                 focus:outline-none focus:ring-2 focus:ring-blue-500
                 transition-all duration-200" />
        <select id="m-status"
          class="rounded-xl px-3 py-2.5 text-sm
                 bg-gray-50 dark:bg-gray-800
                 border border-gray-200 dark:border-gray-700
                 text-gray-900 dark:text-white
                 focus:outline-none focus:ring-2 focus:ring-blue-500
                 transition-all duration-200">
          <option value="todo">할 일</option>
          <option value="in_progress">진행 중</option>
          <option value="done">완료</option>
        </select>
      </div>
      <button id="modal-save"
        class="w-full min-h-[44px] rounded-xl
               bg-blue-500 hover:bg-blue-600 active:bg-blue-700
               text-white text-sm font-medium
               shadow-md transition-all duration-200">
        저장
      </button>
    </div>
  </div>

  <!-- ── 토스트 알림 ─────────────────────────────────────────── -->
  <div id="toast"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50
           px-4 py-2.5 rounded-xl text-sm font-medium shadow-lg
           pointer-events-none opacity-0 transition-opacity duration-300">
  </div>

  <script src="app.js"></script>
</body>
</html>
